<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NYONDO HARDWARE DASHBOARD</title>
  </head>
  <style>
    /* Control how a\the webpage looks  */
    * {
      box-sizing: border-box;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    /* sets the page bg color and text color */
    body {
      background: #f4f6f8;
      color: #222;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 240px;
      height: 100vh;
      background: #1f2937;
      color: white;
      padding: 20px;
    }
    .logo {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .slogan {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 40px;
      font-style: italic;
    }
    .menu a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 12px 0;
      font-size: 16px;
      margin-top: 10px;
    }
    .menu a:hover {
      color: #f59e0b;
    }
    .main {
      margin-left: 260px;
      padding: 50px;
    }
    .header {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .card h3 {
      margin-bottom: 10px;
    }
    .card:hover {
      color: #d97706;
      background-color: #e3caad;
    }
    .header:hover {
      color: #d97706;
      background-color: #1f2937;
    }
    /*logo box styling*/
    .logo-box {
      width: 60px;
      height: 60px;
      background: #f59e0b;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      color: #1f2937;
      margin: 0 auto 15px;
      position: relative;
      z-index: 1;
    }
    /*header text styling*/
    .header-section h1 {
      font-size: 24px;
      margin-bottom: 5px;
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .header-section p {
      font-size: 13px;
      opacity: 0.8;
      position: relative;
      z-index: 1;
    }
  </style>
  <body>
    <div class="sidebar">
      <div class="header-section">
        <div class="logo-box">N</div>
        <h1>NYONDO</h1>
        <p>Hardware Management System</p>
      </div>
      <div class="menu">
        <a href="index.html">LOGIN PAGE</a>
        <a href="sales.html">SALES PAGE</a>
        <a href="stock.html">STOCK PAGE</a>
        <a href="customer_registration.html">CUSTOMER REGISTRATION</a>
      </div>
    </div>
    <div class="main">
      <div class="header">
        <h1>Welcome to Nyondo Hardware dashboard</h1>
        <p>Manage Stock, Sales, and products easily</p>
      </div>
      <div class="cards">
        <div class="card">
          <h3>TOTAL PRODUCTS</h3>
          <p>250 ITEMS</p>
        </div>
        <div class="card">
          <h3>SALES TODAY</h3>
          <p>UGX 1,250,000</p>
        </div>
        <div class="card">
          <h3>LOW STOCK</h3>
          <p>12ITEMS</p>
        </div>
        <div class="card">
          <h3>GOODS SOLD ON CREDIT</h3>
          <p>250 ITEMS</p>
        </div>
      </div>
    </div>
  </body>
</html>
