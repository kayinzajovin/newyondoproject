<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Form-Nyondo Summary</title>
  </head>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    /*responsive design for smaller screens*/
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      .form-card {
        width: 100%;
        margin: 20px auto;
        padding: 20px;
        border-radius: 10px;
      }
      .header-section {
        padding: 25px 20px;
        border-radius: 12px;
      }
      .header-section h1 {
        font-size: 20px;
      }
      .header-section p {
        font-size: 12px;
      }
      .row {
        flex-direction: column;
        gap: 15px;
      }
      .col {
        width: 100%;
      }
      input,
      select,
      button {
        font-size: 14px;
        padding: 10px 12px;
      }
      .btn {
        display: block;
        width: 100%;
        text-align: center;
      }
    }
    body {
      background-color: #f4f6f8;
      margin: 0;
      padding: 20px;
    }
    .form-card {
      width: 550px;
      margin: 40px auto;
      padding: 50px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      /* border-top: 20px solid #1f2937; */
    }

    .navbar {
      background: #1f2937;
      color: white;
      padding: 20px;
      margin-bottom: 30px;
      border-radius: 10px;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
    }

    h2 {
      color: #1f2937;
      margin-bottom: 25px;
      border-bottom: 2px solid #f4f6f8;
      padding-bottom: 10px;
    }

    .row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .col {
      flex: 1;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #1f2937;
    }

    /*input and select field styling*/
    input,
    select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.3s ease;
      background-color: #f9fafb;
    }

    input:hover,
    select:hover {
      border-color: #f59e0b;
      box-shadow: 0 5px 15px rgba(245, 158, 11, 0.2);
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #1f2937;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #1f2937;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 20px;
    }
    button:hover {
      background: #f59e0b;
      transform: scale(1.01);
    }

    /*logo box styling*/
    .logo-box {
      width: 60px;
      height: 60px;
      background: #f59e0b;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      color: #1f2937;
      margin: 0 auto 15px;
      position: relative;
      z-index: 1;
    }

    /*header section with gradient background*/
    .header-section {
      background: linear-gradient(135deg, #1f2937 0%, #2d3748 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
      position: relative;
      border-radius: 20px;
    }
    .header-section p {
      font-size: 13px;
      opacity: 0.8;
      position: relative;
      z-index: 1;
    }

    /*header text styling*/
    .header-section h1 {
      font-size: 24px;
      margin-bottom: 5px;
      position: relative;
      z-index: 1;
    }
    .title {
      color: white;
    }
    .btn {
      display: inline-block;
      padding: 12px 20px;
      background-color: #1f2937;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      text-align: left;
      margin-top: 20px;
    }
    .btn:hover {
      color: #d97706;
    }
  </style>
  <body>
    <div class="form-card">
      <div class="header-section">
        <div class="logo-box">N</div>

        <h1>NYONDO</h1>
        <p>Hardware Management System</p>
        <h2 class="title">CUSTOMER REGISTRATION</h2>
      </div>

      <form>
        <h2>PERSONAL INFORMATION</h2>
        <div class="row">
          <div class="col">
            <label>FULL NAME</label>
            <input
              type="text"
              placeholder="Please enter full name"
              required
            />
          </div>

          <div class="col">
            <label>NIN NUMBER</label>
            <input
              type="text"
              placeholder="Please enter NIN "
              required
            />
          </div>
        </div>
        <h2>CONTANCT DETAILS</h2>
        <div class="row">
          <div class="col">
            <label>PHONE NUMBER</label>
            <input type="number" placeholder="Please enter tel" required />
          </div>

          <div class="col">
            <label>EMAIL ADDRESS</label>
            <input type="text" placeholder="Please enter email" required />
          </div>
        </div>
        <h2>LOCATION</h2>
        <div class="row">
          <div class="col">
            <label>LOCATION/ADDRESS</label>
            <input
              type="number"
              placeholder="Please enter physical location"
              required
            />
          </div>
        </div>

        <button type="submit">REGISTER CUSTOMER</button>
        <a href="customer_deposit.html" class="btn">CUSTOMER DEPOSIT</a>
      </form>
    </div>
    <script>
      //automatically set  today's date
      document.getElementByd("sale_date").ValueAsDate = new Date();
    </script>
  </body>
</html>
