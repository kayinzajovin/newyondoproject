<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nyondo hardware - Login</title>
  </head>
  <style>
    /*Global reset and default font styling*/
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segeo UI", "Segeo UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    /*main page layout and center alignment*/
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /*outer wrapper for the login container*/
    .login-wrapper {
      width: 100%;
      max-width: 450px;
    }

    /*main login card box styling*/
    .login-card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    /*header section with gradient background*/
    .header-section {
      background: linear-gradient(135deg, #1f2937 0%, #2d3748 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
      position: relative;
    }

    /*logo box styling*/
    .logo-box {
      width: 60px;
      height: 60px;
      background: #f59e0b;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      color: #1f2937;
      margin: 0 auto 15px;
      position: relative;
      z-index: 1;
    }

    /*header text styling*/
    .header-section h1 {
      font-size: 24px;
      margin-bottom: 5px;
      position: relative;
      z-index: 1;
    }

    .header-section p {
      font-size: 13px;
      opacity: 0.8;
      position: relative;
      z-index: 1;
    }

    /*form content section*/
    .form-section {
      padding: 40px 30px;
    }

    /*form title styling*/
    .form-title {
      font-size: 18px;
      color: #1f2937;
      margin-bottom: 25px;
      font-weight: bold;
      text-align: center;
    }
    /*input field grouping*/
    .form-group {
      margin-bottom: 20px;
    }

    /*label text styling*/
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    /*input and select field styling*/
    input,
    select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.3s ease;
      background-color: #f9fafb;
    }

    /*focus efeect for the form fields*/
    input:focus,
    select:focus {
      outline: none;
      border-color: #f59e0b;
      background-color: white;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
    }

    /*placeholder text styling*/
    input::placeholder {
      color: #9ca3af;
    }

    /*remember me and forgot password section*/
    .remember-forgot {
      display: flex;
      justify-content: space-between;
      margin-bottom: 25px;
      font-size: 13px;
    }

    /*link styling*/
    .remember-forgot a {
      color: #f59e0b;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .remember-forgot a:hover {
      color: #d97706;
    }

    /*checkbox alignment*/
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .checkbox-group input[type="checkbox"] {
      width: auto;
      cursor: pointer;
    }

    /*login button styling*/
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1f2937 0%, #2d3748 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }

    /*button hover and click effects*/
    .btn-login:hover {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
    }
    .btn-login:active {
      transform: translateY(0);
    }

    /* sign up section below form*/
    .signup-section {
      text-align: center;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
      font-size: 14px;
      color: #6b7280;
    }

    /*signup link styling*/
    .signup-section a {
      color: #f59e0b;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .signup-section a:hover {
      color: #d97706;
    }
    /*footer information styling */
    .footer-info {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: #9ca3af;
    }
    /*responsive design for smaller screens*/
    @media (max-width: 480px) {
      .login-card {
        border-radius: 10px;
      }
      .form-section {
        padding: 30px 20px;
      }
      .header-section {
        padding: 30px 20px;
      }
    }
    /*decorative circular background effect*/
    .header-section::before {
      content: "";
      position: absolute;
      top: 0;
      right: -50px;
      width: 150px;
      height: 150px;
      background: rgba(245, 158, 11, 0.1);
      border-radius: 50%;
    }
    .btn{
      display: inline-block;
      padding: 12px 20px;
      background-color: #1f2937;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      text-align: left;
    }
    .btn:hover{
       color: #d97706;
    }
  </style>
  <body>
    <!--Login page container with a centered card displaying the system title and description -->
    <div class="login-wrapper">
      <div class="login-card">
        <!--Header section-->
        <div class="header-section">
          <div class="logo-box">N</div>
          <h1>NYONDO</h1>
          <p>Hardware Management System</p>
        </div>
<div class="form-section">
    <div class="form-title">Sign In to Your Account </div>
        <form>
          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              placeholder="Please enter your username"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="text"
              id="password"
              placeholder="Please enter your password"
              required
            />
          </div>
          <div class="form-group">
            <label for="role">Login As</label>
            <select id="role" required>
              <option value="" disabled selected>Select your role</option>
              <option value="admin">Admin</option>
              <option value="manager">Manager</option>
              <option value="cashier">Cashier</option>
              <option value="staff">Staff</option>
            </select>
          </div>
          <div class="remember-forgot">
            <div class="checkbox-group">
              <input type="checkbox" id="remember" name="remember" />
              <label
                for="remember"
                style="margin: 0; text-transform: none; font-weight: normal"
                >Remember me</label
              >
            </div>
            <a href="#">Forgot password?</a>
          </div>
          <button type="Submit" class="btn-login">Sign In</button>
          <a href="sales.html"  class="btn">SALES PAGE</a>
        </form>
        <div class="signup-section">
          Don't have an account? <a href="#">Create one</a>
        </div>
        <div class="footer-info">
          @ 2026 Nyondo Hardware. All rights reserved.
        </div>
      </div>
    </div>
    </div>
  </body>
</html>
